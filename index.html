<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>PONG GAME</h1>
        <div class="scoreboard">
            <div class="score">
                <span class="label">Player</span>
                <span id="playerScore" class="score-value">0</span>
            </div>
            <div class="divider">:</div>
            <div class="score">
                <span class="label">Computer</span>
                <span id="computerScore" class="score-value">0</span>
            </div>
        </div>
        <canvas id="pongCanvas" width="800" height="400"></canvas>
        <div class="instructions">
            <p><strong>Controls:</strong></p>
            <p>🖱️ Move mouse up/down or use ⬆️⬇️ arrow keys to control paddle</p>
            <p>Press <strong>SPACE</strong> to start/pause game</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
